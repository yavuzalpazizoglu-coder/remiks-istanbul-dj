
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Noto+Sans+JP:wght@700;900&display=swap');

.dj-bg {
  width: 100%;
  aspect-ratio: 9/16;
  max-height: 700px;
  background: #0a0a0a;
  position: relative;
  overflow: hidden;
  border-radius: 12px;
  font-family: 'Anton', sans-serif;
}

.grain {
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  z-index: 1;
  pointer-events: none;
}

.spotlight {
  position: absolute;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  top: -80px;
  left: 50%;
  transform: translateX(-50%);
  background: radial-gradient(circle, rgba(255,40,40,0.18) 0%, rgba(255,40,40,0.05) 40%, transparent 70%);
  z-index: 1;
}

.spotlight2 {
  position: absolute;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  bottom: -100px;
  right: -100px;
  background: radial-gradient(circle, rgba(255,180,40,0.1) 0%, transparent 60%);
  z-index: 1;
}

.content {
  position: relative;
  z-index: 2;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 28px 24px;
  box-sizing: border-box;
}

.top-section {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.top-left {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.label-tag {
  font-size: 11px;
  letter-spacing: 4px;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
}

.ep-label {
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 2px;
  font-family: 'Anton', sans-serif;
}

.top-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
}

.live-dot {
  width: 8px;
  height: 8px;
  background: #ff2828;
  border-radius: 50%;
  animation: pulse-dot 2s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.live-label {
  font-size: 10px;
  color: #ff2828;
  letter-spacing: 3px;
}

.center-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  margin-top: -40px;
}

.main-title {
  font-size: 120px;
  font-weight: 400;
  color: #fff;
  line-height: 0.85;
  letter-spacing: -4px;
  text-align: center;
  text-shadow: 0 0 60px rgba(255,40,40,0.3);
}

.sub-jp {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: rgba(255,255,255,0.6);
  letter-spacing: 12px;
  margin-top: 8px;
}

.divider-line {
  width: 60px;
  height: 2px;
  background: rgba(255,255,255,0.15);
  margin: 16px auto;
}

.request-label {
  font-size: 14px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 6px;
  text-transform: uppercase;
}

.eq-bars {
  display: flex;
  align-items: flex-end;
  gap: 3px;
  height: 50px;
  justify-content: center;
  margin-top: 24px;
}

.eq-bar {
  width: 4px;
  background: linear-gradient(to top, #ff2828, #ff6b35);
  border-radius: 2px;
  animation: eq-bounce var(--dur) ease-in-out infinite alternate;
  opacity: 0.7;
}

@keyframes eq-bounce {
  0% { height: var(--h1); }
  100% { height: var(--h2); }
}

.bottom-section {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}

.bottom-left {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.powered-by {
  font-size: 9px;
  color: rgba(255,255,255,0.2);
  letter-spacing: 3px;
  text-transform: uppercase;
}

.brand-name {
  font-size: 16px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 3px;
}

.bottom-right {
  display: flex;
  gap: 12px;
  align-items: center;
}

.knob {
  width: 28px;
  height: 28px;
  border: 1.5px solid rgba(255,255,255,0.2);
  border-radius: 50%;
  position: relative;
}

.knob::after {
  content: '';
  position: absolute;
  width: 2px;
  height: 8px;
  background: rgba(255,255,255,0.4);
  top: 4px;
  left: 50%;
  transform: translateX(-50%) rotate(var(--rot, 0deg));
  border-radius: 1px;
  transform-origin: bottom center;
}

.side-text {
  position: absolute;
  right: 24px;
  top: 50%;
  transform: translateY(-50%) rotate(90deg);
  font-size: 10px;
  color: rgba(255,255,255,0.15);
  letter-spacing: 6px;
  text-transform: uppercase;
  white-space: nowrap;
  z-index: 2;
}

.corner-line {
  stroke: rgba(255,255,255,0.08);
  stroke-width: 1;
}
.corner-marks { position: absolute; z-index: 2; }
.corner-marks.tl { top: 16px; left: 16px; }
.corner-marks.br { bottom: 16px; right: 16px; }
</style>

<div class="dj-bg">
  <div class="grain"></div>
  <div class="spotlight"></div>
  <div class="spotlight2"></div>
  
  <svg class="corner-marks tl" width="24" height="24"><line class="corner-line" x1="0" y1="0" x2="24" y2="0"/><line class="corner-line" x1="0" y1="0" x2="0" y2="24"/></svg>
  <svg class="corner-marks br" width="24" height="24"><line class="corner-line" x1="24" y1="24" x2="0" y2="24"/><line class="corner-line" x1="24" y1="24" x2="24" y2="0"/></svg>
  
  <div class="side-text">DJ Request Platform</div>
  
  <div class="content">
    <div class="top-section">
      <div class="top-left">
        <div class="label-tag">Session</div>
        <div class="ep-label">EP—01</div>
      </div>
      <div class="top-right">
        <div class="live-dot"></div>
        <div class="live-label">LIVE</div>
      </div>
    </div>
    
    <div class="center-block">
      <div class="main-title">D.J.</div>
      <div class="sub-jp">リクエスト</div>
      <div class="divider-line"></div>
      <div class="request-label">Request your track</div>
      
      <div class="eq-bars">
        <div class="eq-bar" style="--dur:0.8s;--h1:12px;--h2:38px"></div>
        <div class="eq-bar" style="--dur:0.6s;--h1:20px;--h2:45px"></div>
        <div class="eq-bar" style="--dur:0.9s;--h1:8px;--h2:32px"></div>
        <div class="eq-bar" style="--dur:0.5s;--h1:28px;--h2:50px"></div>
        <div class="eq-bar" style="--dur:0.7s;--h1:15px;--h2:42px"></div>
        <div class="eq-bar" style="--dur:1.0s;--h1:10px;--h2:35px"></div>
        <div class="eq-bar" style="--dur:0.55s;--h1:22px;--h2:48px"></div>
        <div class="eq-bar" style="--dur:0.85s;--h1:6px;--h2:30px"></div>
        <div class="eq-bar" style="--dur:0.65s;--h1:18px;--h2:40px"></div>
        <div class="eq-bar" style="--dur:0.75s;--h1:25px;--h2:46px"></div>
        <div class="eq-bar" style="--dur:0.9s;--h1:14px;--h2:36px"></div>
        <div class="eq-bar" style="--dur:0.5s;--h1:20px;--h2:44px"></div>
      </div>
    </div>
    
    <div class="bottom-section">
      <div class="bottom-left">
        <div class="powered-by">Powered by</div>
        <div class="brand-name">Remiks İstanbul</div>
      </div>
      <div class="bottom-right">
        <div class="knob" style="--rot:-45deg"></div>
        <div class="knob" style="--rot:30deg"></div>
      </div>
    </div>
  </div>
</div>
